<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- V rechter Arm + Serife (hinterste Ebene) – dicker Strich -->
  <rect fill="#50535a" x="70" y="3" width="19" height="4"/>
  <polygon fill="#50535a" points="72,5 87,5 50,72"/>

  <!-- I: Schaft + Ober- und Unterserife (mittlere Ebene) – nach unten versetzt -->
  <rect fill="#50535a" x="27" y="26" width="46" height="7"/>
  <rect fill="#50535a" x="45" y="26" width="10" height="69"/>
  <rect fill="#50535a" x="27" y="88" width="46" height="7"/>

  <!-- V linker Arm + Serife (vorderste Ebene) – dünner Strich -->
  <polygon fill="#50535a" points="2,5 9,5 50,72"/>
  <rect fill="#50535a" x="0" y="3" width="12" height="4"/>
</svg>
